application:
  version: ${APP_VERSION:1.0.0}

spring:
  application:
    name: gateway-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

    gateway:
      routes:
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: knowledge-service
          uri: lb://knowledge-service
          predicates:
            - Path=/api/knowledge/**

        - id: log-service
          uri: lb://log-service
          predicates:
            - Path=/api/log/**

        - id: workflow-service
          uri: lb://workflow-service
          predicates:
            - Path=/api/workflow/**

server:
  port: 8080