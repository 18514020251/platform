application:
  version: ${APP_VERSION:1.0.0}

spring:
  application:
    name: platform-gateway

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

    gateway:
      routes:
        - id: platform-auth-service
          uri: lb://platform-auth-service
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: platform-workflow-service
          uri: lb://platform-workflow-service
          predicates:
            - Path=/workflow/**
          filters:
            - StripPrefix=1

        - id: platform-knowledge-service
          uri: lb://platform-knowledge-service
          predicates:
            - Path=/knowledge/**
          filters:
            - StripPrefix=1

        - id: platform-ai-service
          uri: lb://platform-ai-service
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=1

        - id: platform-log-service
          uri: lb://platform-log-service
          predicates:
            - Path=/log/**
          filters:
            - StripPrefix=1
server:
  port: 8080