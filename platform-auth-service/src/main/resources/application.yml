application:
  version: ${APP_VERSION:1.0.0}

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/platform_auth?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: '${MYSQL_PASSWORD}'
    driver-class-name: com.mysql.cj.jdbc.Driver

  application:
    name: platform-auth-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 5s

server:
  port: 8081

platform:
  redis:
    health-check:
      enabled: true
      fail-fast: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid